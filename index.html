<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>限定大頭貼頭框產生器</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; background: #f0f2f5; padding: 20px; margin: 0; }
        .card { max-width: 450px; margin: 30px auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-bottom: 8px; }
        p { color: #666; font-size: 14px; margin-bottom: 24px; }
        #preview-box { position: relative; width: 280px; height: 280px; margin: 0 auto 24px auto; border: 2px dashed #ccc; border-radius: 12px; overflow: hidden; display: none; }
        canvas { display: none; } /* 隱藏原本的 canvas */
        #final-image { width: 100%; height: 100%; display: block; } /* 顯示真正的圖片供長按儲存 */
        .btn { display: inline-block; width: 100%; max-width: 280px; padding: 12px 0; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; margin-bottom: 12px; }
        .btn-upload { background: #007fff; color: white; }
        .btn-upload:hover { background: #0066cc; }
        .tip-text { color: #e44d26; font-size: 14px; font-weight: bold; display: none; margin-top: 10px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>專屬大頭貼產生器</h2>
    <p>上傳照片，自動為你套用特製頭框！</p>
    
    <button class="btn btn-upload" onclick="document.getElementById('file-input').click()">1. 上傳我的照片</button>
    <input type="file" id="file-input" accept="image/*">
    
    <div id="preview-box">
        <canvas id="canvas" width="1000" height="1000"></canvas>
        <img id="final-image" alt="大頭貼成品">
    </div>
    
    <div id="tip" class="tip-text">🎉 製作完成！請「長按上方圖片」並選擇儲存至相簿。</div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const previewBox = document.getElementById('preview-box');
    const finalImage = document.getElementById('final-image');
    const tipText = document.getElementById('tip');

    const frameImg = new Image();
    frameImg.src = 'frame.png'; 

    let userImg = new Image();

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => { userImg.src = event.target.result; };
        reader.readAsDataURL(file);
    });

    userImg.onload = () => {
        previewBox.style.display = 'block';
        tipText.style.display = 'block';
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const scale = Math.max(canvas.width / userImg.width, canvas.height / userImg.height);
        const x = (canvas.width / 2) - (userImg.width / 2) * scale;
        const y = (canvas.height / 2) - (userImg.height / 2) * scale;
        
        ctx.drawImage(userImg, x, y, userImg.width * scale, userImg.height * scale);
        ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);

        // 重點：將畫布轉換為真正的圖片格式，塞進 <img> 標籤中
        finalImage.src = canvas.toDataURL('image/png');
    };
</script>

</body>
</html>
